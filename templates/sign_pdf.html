{% extends "layout.html" %}
{% block content %}

<div class="container mt-5">
<div class="glass-card">

<h3 class="fw-bold mb-4">Advanced PDF Sign & Edit</h3>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="file" id="pdfUpload" class="form-control mb-3" required>

<div id="pdf-container"></div>

<hr>

<h5>Signature</h5>
<canvas id="signature-pad"
        style="border:1px solid #ccc; width:100%; height:120px;"></canvas>
<input type="hidden" name="signature" id="signature-input">

<hr>

<h5>Add Text Field</h5>

<input type="text" id="textInput" placeholder="Enter text"
       class="form-control mb-2">

<div class="row">
<div class="col-md-4">
<input type="number" id="textSize"
       value="16" class="form-control">
</div>
<div class="col-md-4">
<input type="color" id="textColor"
       value="#000000" class="form-control">
</div>
<br>
<hr>

<h5>OR Upload Signature Image</h5>
<input type="file"
       id="signatureImageUpload"
       name="signature_image"
       class="form-control mb-3">

<img id="signatureImagePreview"
     style="max-height:80px; display:none; margin-bottom:15px;">
</div>

<input type="hidden" name="text_value" id="text_value">
<input type="hidden" name="text_x" id="text_x">
<input type="hidden" name="text_y" id="text_y">
<input type="hidden" name="text_size" id="text_size">
<input type="hidden" name="text_color" id="text_color">

<input type="hidden" name="pos_x" id="posX">
<input type="hidden" name="pos_y" id="posY">
<input type="hidden" name="page_number" id="pageNumber">

<button type="submit" class="btn btn-primary mt-4">
Apply & Download
</button>

</form>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<script>
let pdfDoc = null;
const container = document.getElementById("pdf-container");

document.getElementById("pdfUpload").addEventListener("change", function(e){

    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(){
        const typedarray = new Uint8Array(this.result);

        pdfjsLib.getDocument(typedarray).promise.then(function(pdf){
            pdfDoc = pdf;

            for(let pageNum = 1; pageNum <= pdf.numPages; pageNum++){
                pdf.getPage(pageNum).then(function(page){

                    const viewport = page.getViewport({scale:1.2});
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");

                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    canvas.style.border = "1px solid #ddd";
                    canvas.style.marginBottom = "20px";

                    container.appendChild(canvas);

                    page.render({
                        canvasContext: ctx,
                        viewport: viewport
                    });

                    // CLICK TO PLACE
                    canvas.addEventListener("click", function(ev){

                        const rect = canvas.getBoundingClientRect();
                        const x = ev.clientX - rect.left;
                        const y = ev.clientY - rect.top;

                        document.getElementById("posX").value = x;
                        document.getElementById("posY").value =
                            canvas.height - y;

                        document.getElementById("pageNumber").value = pageNum;

                        // TEXT placement
                        document.getElementById("text_x").value = x;
                        document.getElementById("text_y").value =
                            canvas.height - y;

                        alert("Placement selected on page " + pageNum);
                    });

                });
            }
        });
    };

    reader.readAsArrayBuffer(file);
});

const signaturePad = new SignaturePad(document.getElementById("signature-pad"));

document.querySelector("form").addEventListener("submit", function(e){

    if(!document.getElementById("pageNumber").value){
        alert("Please click on the PDF to select placement.");
        e.preventDefault();
        return;
    }

    if(!signaturePad.isEmpty()){
        document.getElementById("signature-input").value =
            signaturePad.toDataURL();
    }

    document.getElementById("text_value").value =
        document.getElementById("textInput").value;

    document.getElementById("text_size").value =
        document.getElementById("textSize").value;

    document.getElementById("text_color").value =
        document.getElementById("textColor").value;
});
</script>

<script>
const signatureImageUpload =
    document.getElementById("signatureImageUpload");

const signatureImagePreview =
    document.getElementById("signatureImagePreview");

// Preview uploaded signature image
signatureImageUpload.addEventListener("change", function(e){

    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(){
        signatureImagePreview.src = reader.result;
        signatureImagePreview.style.display = "block";
    };

    if(file){
        reader.readAsDataURL(file);
    }
});
</script>

{% endblock %}
