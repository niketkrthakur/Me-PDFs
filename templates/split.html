{% extends "layout.html" %}

{% block content %}

<h2 class="fw-bold mb-4">Split PDF</h2>

<div class="glass-card">

    <form method="POST" enctype="multipart/form-data" id="splitForm">

        <input type="file"
               id="pdfFile"
               name="pdf_file"
               accept=".pdf"
               class="form-control mb-4"
               required>

        <div id="previewGrid" class="row mb-3"></div>

        <input type="hidden" name="selected_pages" id="selectedPages">

        <button type="submit" class="btn btn-primary">
            Extract Selected Pages
        </button>

    </form>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const pdfInput = document.getElementById("pdfFile");
const previewGrid = document.getElementById("previewGrid");
const selectedPagesInput = document.getElementById("selectedPages");

let selectedPages = [];

pdfInput.addEventListener("change", function() {

    const file = this.files[0];
    const reader = new FileReader();

    reader.onload = function() {
        const typedarray = new Uint8Array(this.result);

        pdfjsLib.getDocument(typedarray).promise.then(pdf => {

            previewGrid.innerHTML = "";
            selectedPages = [];

            for (let i = 1; i <= pdf.numPages; i++) {

                pdf.getPage(i).then(page => {

                    const scale = 0.4;
                    const viewport = page.getViewport({ scale });

                    const canvas = document.createElement("canvas");
                    const context = canvas.getContext("2d");
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    page.render({
                        canvasContext: context,
                        viewport: viewport
                    });

                    const col = document.createElement("div");
                    col.className = "col-md-2 mb-3 text-center";
                    col.style.cursor = "pointer";

                    col.appendChild(canvas);

                    col.onclick = function() {
                        if (selectedPages.includes(i - 1)) {
                            selectedPages = selectedPages.filter(p => p !== i - 1);
                            col.style.border = "";
                        } else {
                            selectedPages.push(i - 1);
                            col.style.border = "3px solid #e63946";
                        }
                        selectedPagesInput.value = selectedPages.join(",");
                    };

                    previewGrid.appendChild(col);
                });
            }
        });
    };

    reader.readAsArrayBuffer(file);
});
</script>

{% endblock %}
