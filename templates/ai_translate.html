{% extends "layout.html" %}
{% block content %}

<div class="container py-5">
    <div class="glass-card mx-auto" style="max-width:900px;">

        <h3 class="fw-bold text-danger mb-4">
            <i class="bi bi-translate me-2"></i>
            AI Translator
        </h3>

        <form method="POST" enctype="multipart/form-data">

            <!-- Text Input -->
            <div class="mb-3">
                <label class="form-label">Paste Text (Optional)</label>
                <textarea name="text_input"
                          class="form-control"
                          rows="6"
                          placeholder="Paste your content here..."></textarea>
            </div>

            <!-- PDF Upload -->
            <div class="mb-3">
                <label class="form-label">Or Upload PDF</label>
                <input type="file" name="file" class="form-control">
            </div>

            <!-- Language Selection -->
            <div class="mb-3">
                <label class="form-label">Translate To</label>
                <select name="language" class="form-select">
                    <option value="Hindi">Hindi</option>
                    <option value="English">English</option>
                    <option value="Spanish">Spanish</option>
                    <option value="French">French</option>
                    <option value="German">German</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Chinese">Chinese</option>
                </select>
            </div>

            <button type="submit" class="btn btn-danger px-4">
                Translate with AI
            </button>

        </form>

        {% if translated %}
        <hr class="my-4">

        <div class="preview-card p-4 mt-3">

            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="fw-bold mb-0">Translated Output</h5>
                <small class="text-muted">
                    Word Count: {{ translated.split()|length }}
                </small>
            </div>
            <p class="text-muted">
            Detected Language: <strong id="detectedLang">{{ detected_language }}</strong>
            </p>

            <div id="translateOutput" class="ai-output">
                {{ translated | safe }}
            </div>

            <div class="mt-3">
                <button class="btn btn-outline-dark btn-sm"
                        onclick="copyTranslation()">
                    Copy Translation
                </button>
                <div class="mt-3 d-flex gap-2 flex-wrap">

                    <button class="btn btn-outline-secondary btn-sm"
                            onclick="speakTranslation()">
                        🔊 Listen
                    </button>

                    <button class="btn btn-outline-dark btn-sm"
                            onclick="stopSpeech()">
                        ⏹ Stop
                    </button>

                    <form method="POST" action="/download-translation-pdf">
                        <input type="hidden" name="translated_html" value="{{ translated }}">
                        <button class="btn btn-outline-danger btn-sm">
                            Download PDF
                        </button>
                    </form>

                    <form method="POST" action="/download-translation-audio">
                        <input type="hidden" name="translated_text" value="{{ translated }}">
                        <button class="btn btn-outline-success btn-sm">
                            Download Audio
                        </button>
                    </form>

                </div>
            </div>
        {% endif %}

    </div>
</div>

<script>
function copyTranslation() {
    const text = document.getElementById("translateOutput").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}
</script>

{% endblock %}
