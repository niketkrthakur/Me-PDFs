{% extends "layout.html" %}

{% block content %}

<h2 class="fw-bold mb-4">Dashboard</h2>

<div class="row">

    <div class="col-md-4 mb-4">
        <div class="glass-card text-center">
            <h3 class="fw-bold text-danger">{{ total_docs }}</h3>
            <p class="text-muted">Documents Created</p>
        </div>
    </div>

    <div class="col-md-4 mb-4">
        <div class="glass-card text-center">
            <h3 class="fw-bold text-primary">{{ total_uploads }}</h3>
            <p class="text-muted">PDFs Uploaded</p>
        </div>
    </div>

    <div class="col-md-4 mb-4">
        <div class="glass-card text-center">
            <h3 class="fw-bold text-success">{{ total_storage }} MB</h3>
            <p class="text-muted">Storage Used</p>
        </div>
    </div>

</div>

{% endblock %}
