{% extends "layout.html" %}
{% block content %}

<h2 class="fw-bold mb-4">PDF to Word</h2>

<div class="glass-card">
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" class="form-control mb-3" accept=".pdf" required>
        <button class="btn btn-primary">Convert to Word</button>
    </form>
</div>

{% endblock %}
