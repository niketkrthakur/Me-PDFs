{% extends "layout.html" %}
{% block content %}

<div class="container">

    <div class="glass-card">

        <h2 class="fw-bold mb-4">
            PowerPoint to PDF
        </h2>

        <p class="text-muted mb-4">
            Upload your .pptx file and convert it to PDF instantly.
        </p>

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-4">
                <input type="file"
                       name="file"
                       class="form-control"
                       accept=".ppt,.pptx"
                       required>
            </div>

            <button type="submit" class="btn btn-primary">
                Convert to PDF →
            </button>

        </form>

    </div>

</div>

{% endblock %}
