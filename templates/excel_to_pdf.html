{% extends "layout.html" %}

{% block content %}
<h2 class="fw-bold mb-4">Excel to PDF</h2>

<div class="glass-card text-center">
    <form method="POST" enctype="multipart/form-data">
        <input type="file"
               name="file"
               accept=".xls,.xlsx"
               required
               class="form-control mb-4">

        <button class="btn btn-primary btn-lg">
            Convert to PDF
        </button>
    </form>
</div>
{% endblock %}
