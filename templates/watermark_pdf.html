{% extends "layout.html" %}
{% block content %}

<div class="container py-5">
    <div class="glass-card mx-auto p-4" style="max-width:650px;">

        <h3 class="fw-bold text-danger mb-4 text-center">
            <i class="bi bi-droplet-half me-2"></i>
            Watermark PDF
        </h3>

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Upload PDF</label>
                <input type="file" name="file" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Watermark Text</label>
                <input type="text" name="watermark_text" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Position</label>
                <select name="position" class="form-select">
                    <option value="center">Center</option>
                    <option value="top-left">Top Left</option>
                    <option value="bottom-right">Bottom Right</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Opacity (0.1 - 1)</label>
                <input type="number" step="0.1" min="0.1" max="1"
                       name="opacity"
                       value="0.3"
                       class="form-control">
            </div>

            <button class="btn btn-danger w-100">
                <i class="bi bi-image me-1"></i>
                Add Watermark
            </button>

        </form>

    </div>
</div>

{% endblock %}
