{% extends "layout.html" %}
{% block content %}

<div class="container py-5">

    <div class="glass-card mx-auto" style="max-width:900px;">

        <h3 class="fw-bold mb-4 text-danger">
            <i class="bi bi-pencil-square me-2"></i>
            AI Rewrite Tool
        </h3>

        <form method="POST">

            <!-- Text Input -->
            <div class="mb-3">
                <label class="form-label">Paste Your Text</label>
                <textarea name="text_input"
                          class="form-control"
                          rows="8"
                          placeholder="Paste your content here..."
                          required></textarea>
            </div>

            <!-- Rewrite Action -->
            <div class="mb-3">
                <label class="form-label">Rewrite Mode</label>
                <select name="action" class="form-select">
                    <option value="rewrite">Rewrite Clearly</option>
                    <option value="improve">Improve Writing</option>
                    <option value="simplify">Simplify Language</option>
                    <option value="professional">Make Professional</option>
                    <option value="shorten">Shorten</option>
                    <option value="expand">Expand</option>
                </select>
            </div>

            <button type="submit" class="btn btn-danger px-4">
                Rewrite with AI
            </button>

        </form>

        {% if rewritten %}
        <hr class="my-4">

        <div class="preview-card p-4 mt-3">

            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="fw-bold mb-0">Rewritten Output</h5>
                <small class="text-muted">
                    Word Count: {{ rewritten.split()|length }}
                </small>
            </div>

            <div id="rewriteOutput" class="ai-output">
                {{ rewritten | safe }}
            </div>

            <div class="mt-3">
                <button class="btn btn-outline-dark btn-sm"
                        onclick="copyRewrite()">
                    Copy Text
                </button>
            </div>

        </div>
        {% endif %}

    </div>

</div>

<script>
function copyRewrite() {
    const text = document.getElementById("rewriteOutput").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied to clipboard!");
}
</script>

{% endblock %}
