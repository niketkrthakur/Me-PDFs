{% extends "layout.html" %}
{% block content %}

<div class="glass-card">

    <h2 class="fw-bold mb-4">
       <i class="bi bi-stars me-1"></i> AI Document Summariser
    </h2>

    <form method="POST" enctype="multipart/form-data">

        <!-- Upload -->
        <div class="mb-3">
            <label class="form-label">Upload File</label>
            <input type="file" name="file" class="form-control">
        </div>

        <!-- Mode -->
        <div class="mb-3">
            <label class="form-label">Summary Type</label>
            <select name="mode" class="form-select">
                <option value="standard">Standard</option>
                <option value="short">Short</option>
                <option value="bullet">Bullet Points</option>
                <option value="detailed">Detailed</option>
            </select>
        </div>

        <!-- 🔥 ADD THIS HERE -->
        <div class="mb-3">
            <label class="form-label">Tone</label>
            <select name="tone" class="form-select">
                <option value="formal">Formal</option>
                <option value="student">Student Friendly</option>
                <option value="executive">Executive</option>
            </select>
        </div>

        <button type="submit" class="btn btn-danger">
            Generate Summary
        </button>

    </form>

    {% if summary %}
    <hr class="my-4">

    <div class="preview-card p-4 mt-3">
        <h5 class="fw-bold mb-2">AI Generated Summary</h5>

        <div id="aiOutput" class="ai-output">
            {{ summary | safe }}
        </div>

        <div class="mt-3 text-muted">
            Word Count: <span id="wordCount"></span>
        </div>

        <div class="mt-3 d-flex gap-2 flex-wrap">
            <button class="btn btn-outline-dark btn-sm" onclick="copySummary()">
                Copy Summary
            </button>

            <form method="POST" action="/download-summary-pdf">
                <input type="hidden" name="summary_html" value="{{ summary }}">
                <button class="btn btn-outline-danger btn-sm">
                    Download as PDF
                </button>
            </form>

            <form method="POST" action="/insert-into-editor">
                <input type="hidden" name="summary_html" value="{{ summary }}">
                <button class="btn btn-outline-primary btn-sm">
                    Insert Into Word Editor
                </button>
            </form>
        <div class="mt-3">
            <strong>AI Rewrite:</strong>
            <div class="d-flex flex-wrap gap-2 mt-2">

                <button class="btn btn-sm btn-outline-secondary" onclick="rewriteAI('rewrite')">Rewrite</button>
                <button class="btn btn-sm btn-outline-primary" onclick="rewriteAI('improve')">Improve</button>
                <button class="btn btn-sm btn-outline-success" onclick="rewriteAI('simplify')">Simplify</button>
                <button class="btn btn-sm btn-outline-dark" onclick="rewriteAI('professional')">Professional</button>
                <button class="btn btn-sm btn-outline-warning" onclick="rewriteAI('shorten')">Shorten</button>
                <button class="btn btn-sm btn-outline-info" onclick="rewriteAI('expand')">Expand</button>

            </div>
        </div>    
        </div>
    </div>
    {% endif %}                                

</div>

{% endblock %}
